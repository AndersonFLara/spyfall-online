<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyfall Online - Edição Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0b0b; color: #fff; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 20px auto; background: #161616; padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #ff4757; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #222; color: #fff; border: 1px solid #444; }
        button { width: 90%; padding: 15px; background: #ff4757; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; }
        button:hover { background: #ff6b81; transform: translateY(-2px); }
        
        /* Patrocinadores */
        .sponsors { margin-top: 40px; padding-top: 20px; border-top: 1px solid #222; }
        .sponsors p { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .logo-container { display: flex; justify-content: center; gap: 30px; align-items: center; flex-wrap: wrap; }
        .logo-container img { height: 70px; width: auto; filter: grayscale(20%); transition: 0.3s; border-radius: 8px; border: 1px solid #222; cursor: pointer; }
        .logo-container img:hover { filter: grayscale(0%); transform: scale(1.05); border-color: #ff4757; box-shadow: 0 0 15px rgba(255, 71, 87, 0.3); }

        .btn-end { background: #444 !important; margin-top: 25px; }
        .hidden { display: none !important; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: #252525; margin: 8px 0; padding: 12px; border-radius: 8px; border-left: 4px solid #ff4757; }
        .host-badge { background: #ffa502; color: #000; font-size: 10px; padding: 3px 6px; border-radius: 4px; float: right; font-weight: bold; }
        #locationGuide { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 220px; overflow-y: auto; background: #000; padding: 15px; margin-top: 20px; border-radius: 8px; border: 1px solid #222; }
        .loc-item { font-size: 11px; color: #666; text-align: left; }
        .strikethrough { text-decoration: line-through; color: #ff4757; opacity: 0.5; }
        .role-card { font-size: 1.5em; font-weight: bold; padding: 30px; border: 2px dashed #ff4757; margin: 20px 0; background: #1a1a1a; border-radius: 10px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ff4757; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login">
            <h1>SPYFALL</h1>
            <input type="text" id="username" placeholder="Seu Nome">
            <input type="text" id="room" placeholder="ID da Sala (Letras ou Números)">
            <button onclick="join()">ENTRAR NA REDE</button>

            <div class="sponsors">
                <p>Apoiadores:</p>
                <div class="logo-container">
                    <a href="https://google.com" target="_blank">
                        <img src="logocostela.jpg" alt="Logo Costela">
                    </a>
                    <a href="https://google.com" target="_blank">
                        <img src="logo-helpcell.png" alt="Logo HelpCell">
                    </a>
                </div>
            </div>
        </div>

        <div id="lobby" class="hidden">
            <h2>SALA: <span id="roomName" style="color: #ff4757;"></span></h2>
            <ul id="playerList"></ul>
            <button id="startBtn" class="hidden" onclick="start()">INICIAR MISSÃO</button>
            <div id="waitMsg">Aguardando o Líder da Sala...</div>
        </div>

        <div id="game-area" class="hidden">
            <div id="roleDisplay" class="role-card"></div>
            <p id="gameHint" style="color: #888; font-size: 14px;"></p>
            <div id="locationGuide"></div>
            <button id="endBtn" class="btn-end hidden" onclick="endGame()">ENCERRAR PARTIDA</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myRoom = "";
        let amIHost = false;

        function join() {
            const user = document.getElementById('username').value;
            myRoom = document.getElementById('room').value;
            if(user && myRoom) {
                socket.emit('joinRoom', { roomId: myRoom, username: user });
                document.getElementById('roomName').innerText = myRoom;
                document.getElementById('login').classList.add('hidden');
                document.getElementById('lobby').classList.remove('hidden');
            }
        }

        function start() { socket.emit('startGame', myRoom); }
        function endGame() { socket.emit('endGame', myRoom); }

        socket.on('setHost', (status) => {
            amIHost = status;
            checkHostButtons();
        });

        socket.on('updatePlayers', (data) => {
            if (socket.id === data.hostId) amIHost = true;
            document.getElementById('playerList').innerHTML = data.players.map(p => `
                <li>👤 ${p.username} ${p.id === data.hostId ? '<span class="host-badge">LÍDER</span>' : ''}</li>
            `).join('');
            checkHostButtons();
        });

        function checkHostButtons() {
            const startBtn = document.getElementById('startBtn');
            const waitMsg = document.getElementById('waitMsg');
            const endBtn = document.getElementById('endBtn');
            const gameVisible = !document.getElementById('game-area').classList.contains('hidden');

            if (amIHost) {
                startBtn.classList.toggle('hidden', gameVisible);
                waitMsg.classList.add('hidden');
                if (gameVisible) endBtn.classList.remove('hidden');
            } else {
                startBtn.classList.add('hidden');
                waitMsg.classList.remove('hidden');
                endBtn.classList.add('hidden');
            }
        }

        socket.on('receiveRole', (data) => {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            
            const card = document.getElementById('roleDisplay');
            card.innerText = data.role;
            card.style.color = data.isSpy ? "#ff4757" : "#2ed573";

            document.getElementById('gameHint').innerText = data.isSpy ? 
                "Tente descobrir o local fazendo perguntas discretas!" : 
                "Descubra quem é o infiltrado!";

            checkHostButtons();

            const guide = document.getElementById('locationGuide');
            guide.innerHTML = data.allLocations.map(loc => {
                const isUsed = data.used.includes(loc);
                const showStrike = !data.isSpy && isUsed;
                return `<div class="loc-item ${showStrike ? 'strikethrough' : ''}">${loc}</div>`;
            }).join('');
        });

        socket.on('backToLobby', (spyName) => {
            alert("🚨 PARTIDA ENCERRADA!\nO espião infiltrado era: " + spyName);
            document.getElementById('game-area').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            checkHostButtons();
        });
    </script>
</body>
</html>
