<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyfall - HelpCell</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #fff; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 20px auto; background: #161616; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: #ff4757; text-transform: uppercase; letter-spacing: 2px; }
        input, select { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #222; color: #fff; border: 1px solid #444; }
        button { width: 90%; padding: 15px; background: #ff4757; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        .sponsors { margin-top: 30px; padding-top: 20px; border-top: 1px solid #222; }
        .logo-container img { height: 60px; margin: 0 10px; border-radius: 5px; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: #252525; margin: 8px 0; padding: 12px; border-radius: 8px; border-left: 4px solid #ff4757; }
        .host-badge { background: #ffa502; color: #000; font-size: 10px; padding: 3px 6px; border-radius: 4px; float: right; font-weight: bold; }
        .spy-config { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        #locationGuide { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 200px; overflow-y: auto; background: #000; padding: 15px; margin-top: 20px; border-radius: 8px; }
        .loc-item { font-size: 11px; color: #666; text-align: left; }
        .strikethrough { text-decoration: line-through; color: #ff4757; opacity: 0.5; }
        .role-card { font-size: 1.5em; font-weight: bold; padding: 30px; border: 2px dashed #ff4757; margin: 20px 0; background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body onload="resetApp()">
    <div class="container">
        <div id="login">
            <h1>SPYFALL</h1>
            <input type="text" id="username" placeholder="Seu Nome">
            <input type="text" id="room" placeholder="ID da Sala">
            <button onclick="join()">ENTRAR</button>
            <div class="sponsors">
                <div class="logo-container">
                    <img src="logocostela.jpg" alt="Costela">
                    <img src="logo-helpcell.png" alt="HelpCell">
                </div>
            </div>
        </div>

        <div id="lobby" class="hidden">
            <h2>SALA: <span id="roomName" style="color: #ff4757;"></span></h2>
            <div id="hostControls" class="spy-config hidden">
                <select id="spyCount">
                    <option value="1">1 Espião</option>
                    <option value="2">2 Espiões</option>
                </select>
                <button onclick="startMission()">INICIAR MISSÃO</button>
            </div>
            <ul id="playerList"></ul>
            <div id="waitMsg">Aguardando o Líder...</div>
        </div>

        <div id="game-area" class="hidden">
            <div id="roleDisplay" class="role-card"></div>
            <div id="locationGuide"></div>
            <button id="endBtn" style="background:#444; margin-top:20px;" class="hidden" onclick="endGame()">ENCERRAR PARTIDA</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let myRoom = "";
        let amIHost = false;

        // Limpa tudo ao carregar a página para evitar lixo de memória
        function resetApp() {
            socket = io({
                reconnection: true,
                reconnectionAttempts: 5
            });
            setupListeners();
            console.log("App resetado e Socket conectado.");
        }

        function join() {
            const user = document.getElementById('username').value.trim();
            myRoom = document.getElementById('room').value.trim();
            if(user && myRoom) {
                socket.emit('joinRoom', { roomId: myRoom, username: user });
                document.getElementById('roomName').innerText = myRoom;
                document.getElementById('login').classList.add('hidden');
                document.getElementById('lobby').classList.remove('hidden');
            }
        }

        function startMission() { 
            const spyCount = parseInt(document.getElementById('spyCount').value);
            socket.emit('startGame', { roomId: myRoom, spyCount: spyCount }); 
        }
        
        function endGame() { socket.emit('endGame', myRoom); }

        function setupListeners() {
            socket.on('setHost', (status) => {
                amIHost = status;
                updateUI();
            });

            socket.on('updatePlayers', (data) => {
                if (socket.id === data.hostId) amIHost = true;
                document.getElementById('playerList').innerHTML = data.players.map(p => `
                    <li>👤 ${p.username} ${p.id === data.hostId ? '<span class="host-badge">LÍDER</span>' : ''}</li>
                `).join('');
                updateUI();
            });

            socket.on('receiveRole', (data) => {
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('game-area').classList.remove('hidden');
                const card = document.getElementById('roleDisplay');
                card.innerText = data.role;
                card.style.color = data.isSpy ? "#ff4757" : "#2ed573";
                updateUI();
                const guide = document.getElementById('locationGuide');
                guide.innerHTML = data.allLocations.map(loc => {
                    const isUsed = data.used.includes(loc);
                    const showStrike = !data.isSpy && isUsed;
                    return `<div class="loc-item ${showStrike ? 'strikethrough' : ''}">${loc}</div>`;
                }).join('');
            });

            socket.on('backToLobby', (spyNames) => {
                alert("🚨 MISSÃO ENCERRADA!\nEspião(ões): " + spyNames);
                document.getElementById('game-area').classList.add('hidden');
                document.getElementById('lobby').classList.remove('hidden');
                updateUI();
            });
        }

        function updateUI() {
            const hostControls = document.getElementById('hostControls');
            const waitMsg = document.getElementById('waitMsg');
            const endBtn = document.getElementById('endBtn');
            const gameVisible = !document.getElementById('game-area').classList.contains('hidden');

            if (amIHost) {
                hostControls.classList.toggle('hidden', gameVisible);
                waitMsg.classList.add('hidden');
                if (gameVisible) endBtn.classList.remove('hidden');
            } else {
                hostControls.classList.add('hidden');
                waitMsg.classList.toggle('hidden', gameVisible);
                endBtn.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
