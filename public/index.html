<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyfall - HelpCell</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #fff; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 20px auto; background: #161616; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        h1 { color: #ff4757; text-transform: uppercase; letter-spacing: 2px; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #222; color: #fff; border: 1px solid #444; }
        button { width: 95%; padding: 15px; background: #ff4757; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        .sponsors { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        .logo-container img { height: 60px; margin: 0 10px; border-radius: 5px; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: #252525; margin: 8px 0; padding: 12px; border-radius: 8px; border-left: 4px solid #ff4757; }
        .host-badge { background: #ffa502; color: #000; font-size: 10px; padding: 3px 6px; border-radius: 4px; float: right; font-weight: bold; }
        .role-card { font-size: 1.5em; font-weight: bold; padding: 30px; border: 2px dashed #ff4757; margin: 20px 0; background: #1a1a1a; border-radius: 10px; }
        #locationGuide { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 200px; overflow-y: auto; background: #000; padding: 15px; margin-top: 20px; border-radius: 8px; }
        .loc-item { font-size: 11px; color: #666; }
        .strikethrough { text-decoration: line-through; color: #ff4757; opacity: 0.5; }
    </style>
</head>
<body onload="startApp()">
    <div class="container">
        <div id="login">
            <h1>SPYFALL</h1>
            <input type="text" id="username" placeholder="Seu Nome">
            <input type="text" id="room" placeholder="Nome da Sala">
            <button onclick="join()">ENTRAR</button>
            <div class="sponsors">
                <div class="logo-container">
                    <img src="logocostela.jpg" alt="Costela">
                    <img src="logo-helpcell.png" alt="HelpCell">
                </div>
            </div>
        </div>

        <div id="lobby" class="hidden">
            <h2 id="roomTitle">SALA</h2>
            <div id="hostControls" class="hidden" style="background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <select id="spyCount"><option value="1">1 Espião</option><option value="2">2 Espiões</option></select>
                <button onclick="startMission()">INICIAR MISSÃO</button>
            </div>
            <ul id="playerList"></ul>
            <p id="waitMsg">Aguardando o Líder...</p>
        </div>

        <div id="game-area" class="hidden">
            <div id="roleDisplay" class="role-card"></div>
            <div id="locationGuide"></div>
            <button id="endBtn" style="background:#444; margin-top:20px;" class="hidden" onclick="endGame()">ENCERRAR PARTIDA</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let currentRoom = "";
        let currentName = "";
        let amIHost = false;

        function startApp() {
            socket = io({
                transports: ['polling', 'websocket'],
                reconnection: true,
                reconnectionDelay: 1000
            });

            socket.on('connect', () => {
                if(currentRoom && currentName) {
                    socket.emit('joinRoom', { roomId: currentRoom, username: currentName });
                }
            });

            socket.on('setHost', (val) => { amIHost = val; updateUI(); });

            socket.on('updatePlayers', (data) => {
                if(socket.id === data.hostId) amIHost = true;
                document.getElementById('playerList').innerHTML = data.players.map(p => `
                    <li>👤 ${p.username} ${p.id === data.hostId ? '<span class="host-badge">LÍDER</span>' : ''}</li>
                `).join('');
                updateUI();
            });

            socket.on('receiveRole', (data) => {
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('game-area').classList.remove('hidden');
                const card = document.getElementById('roleDisplay');
                card.innerText = data.role;
                card.style.color = data.isSpy ? "#ff4757" : "#2ed573";
                document.getElementById('locationGuide').innerHTML = data.allLocations.map(loc => {
                    const strike = !data.isSpy && data.used.includes(loc);
                    return `<div class="loc-item ${strike ? 'strikethrough' : ''}">${loc}</div>`;
                }).join('');
                updateUI();
            });

            socket.on('backToLobby', (spies) => {
                alert("FIM DE JOGO! Espiões: " + spies);
                document.getElementById('game-area').classList.add('hidden');
                document.getElementById('lobby').classList.remove('hidden');
                updateUI();
            });
        }

        function join() {
            currentName = document.getElementById('username').value.trim();
            currentRoom = document.getElementById('room').value.trim().toLowerCase();
            if(currentName && currentRoom) {
                socket.emit('joinRoom', { roomId: currentRoom, username: currentName });
                document.getElementById('roomTitle').innerText = "SALA: " + currentRoom.toUpperCase();
                document.getElementById('login').classList.add('hidden');
                document.getElementById('lobby').classList.remove('hidden');
            }
        }

        function startMission() { socket.emit('startGame', { roomId: currentRoom, spyCount: parseInt(document.getElementById('spyCount').value) }); }
        function endGame() { socket.emit('endGame', currentRoom); }

        function updateUI() {
            const isGame = !document.getElementById('game-area').classList.contains('hidden');
            document.getElementById('hostControls').classList.toggle('hidden', !amIHost || isGame);
            document.getElementById('waitMsg').classList.toggle('hidden', amIHost || isGame);
            document.getElementById('endBtn').classList.toggle('hidden', !amIHost || !isGame);
        }

        // TÉCNICA PARA CELULAR: Reconecta ao acender a tela
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible' && (!socket || !socket.connected)) {
                socket.connect();
            }
        });
    </script>
</body>
</html>
